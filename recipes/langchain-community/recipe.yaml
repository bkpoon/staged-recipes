schema_version: 1

context:
  version: "0.4.2"

package:
  name: langchain-community
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langchain-community/langchain_community-${{ version }}.tar.gz
  sha256: a99308160d53d7e9b5965ee665e5173709914338210089fd5788ad724432c21e

build:
  number: 0
  skip: py>=400 or match(python, ">=2,<3")
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.10.0,<4.0.0
    - hatchling
    - pip
  run:
    - python >=3.10.0,<4.0.0
    - langchain-core >=1.4.0,<2.0.0
    - langchain-classic >=1.0.7,<2.0.0
    - sqlalchemy >=1.4.0,<3.0.0
    - requests >=2.32.5,<3.0.0
    - pyyaml >=5.3.0,<7.0.0
    - aiohttp >=3.8.3,<4.0.0
    - tenacity !=8.4.0,>=8.1.0,<10.0.0
    - pydantic-settings >=2.10.1,<3.0.0
    - langsmith >=0.1.125,<1.0.0
    - httpx-sse >=0.4.0,<1.0.0
    - if: match(python, "<3.13")
      then: numpy >=1.26.2
    - if: match(python, ">=3.13")
      then: numpy >=2.1.0

tests:
  - python:
      imports:
        - langchain_community
      pip_check: true

about:
  summary: Community contributed LangChain integrations.
  license: MIT
  license_file: LICENSE
  homepage: https://docs.langchain.com/
  repository: https://github.com/langchain-ai/langchain-community/tree/main/libs/community
  documentation: https://reference.langchain.com/python/langchain_community/

extra:
  recipe-maintainers:
    - bkpoon
